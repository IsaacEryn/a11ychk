<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A11Y Check</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hd">
      <span class="logo" aria-hidden="true"></span>
      <h1>A11Y Check</h1>
      <span id="conn" class="conn" role="status"></span>
    </header>

    <main id="main">
      <p class="target" id="target"></p>

      <button id="scan" class="btn btn-primary" type="button">이 페이지 검사</button>

      <section id="result" hidden aria-live="polite">
        <div class="score-row">
          <div class="score">
            <span id="rate" class="rate">–</span><span class="pct">%</span>
            <span class="score-label">자동 검사 준수율</span>
          </div>
          <ul class="impact" id="impact"></ul>
        </div>
        <label id="procWrap" class="proc" hidden>
          <input type="checkbox" id="isProcess" />
          이 페이지를 다단계 프로세스 단계로 표시 (WCAG-EM)
        </label>
        <button id="save" class="btn btn-save" type="button" hidden>결과를 내 계정에 저장</button>
        <p id="saveMsg" class="save-msg" role="status"></p>
        <h2>위반 상세</h2>
        <ul id="violations" class="violations"></ul>
      </section>

      <section class="manual">
        <h2>수동 점검 체크리스트</h2>
        <p class="hint">자동으로 판정할 수 없는 항목입니다. 직접 확인 후 체크하세요. (현재 페이지 기준 저장)</p>
        <ul id="manual" class="manual-list"></ul>
      </section>
    </main>

    <footer class="ft">
      <a id="connectLink" href="#" target="_blank" rel="noopener">웹 서비스에 연결</a>
      <a id="siteLink" href="#" target="_blank" rel="noopener">a11ychk.com</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
